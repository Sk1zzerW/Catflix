{% extends 'base.html' %}

{% block title %}Community - CATFLIX{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">Community</h1>
        <p class="page-subtitle">Connect with other movie lovers</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="users-grid">
            <div class="user-card">
                <div class="user-avatar-large">
                    <i class="fas fa-cat"></i>
                </div>
                <div class="user-details">
                    <h3 class="user-name">Username</h3>
                    <p class="user-joined">Member since 2024</p>
                    <div class="user-stats">
                        <span><i class="fas fa-star"></i> 234</span>
                        <span><i class="fas fa-film"></i> 12</span>
                    </div>
                </div>
                <button class="user-button">
                    <i class="fas fa-user-plus"></i>
                    Follow
                </button>
            </div>

            <div class="user-card">
                <div class="user-avatar-large">
                    <i class="fas fa-cat"></i>
                </div>
                <div class="user-details">
                    <h3 class="user-name">Username</h3>
                    <p class="user-joined">Member since 2023</p>
                    <div class="user-stats">
                        <span><i class="fas fa-star"></i> 456</span>
                        <span><i class="fas fa-film"></i> 24</span>
                    </div>
                </div>
                <button class="user-button">
                    <i class="fas fa-user-plus"></i>
                    Follow
                </button>
            </div>

            <div class="user-card">
                <div class="user-avatar-large">
                    <i class="fas fa-cat"></i>
                </div>
                <div class="user-details">
                    <h3 class="user-name">Username</h3>
                    <p class="user-joined">Member since 2024</p>
                    <div class="user-stats">
                        <span><i class="fas fa-star"></i> 123</span>
                        <span><i class="fas fa-film"></i> 8</span>
                    </div>
                </div>
                <button class="user-button">
                    <i class="fas fa-user-plus"></i>
                    Follow
                </button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
