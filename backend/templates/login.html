<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CATFLIX</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-cat"></i>
                    <span class="logo-flix">FLIX</span>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue</p>
            </div>

            <form method="POST" action="{% url 'login' %}" class="auth-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input {% if errors.username %}error{% endif %}"
                        value="{{ old_data.username|default:'' }}"
                        placeholder="Enter your username"
                        required
                    >
                    {% if errors.username %}
                        <span class="error-message">{{ errors.username }}</span>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input {% if errors.password %}error{% endif %}"
                        placeholder="Enter your password"
                        required
                    >
                    {% if errors.password %}
                        <span class="error-message">{{ errors.password }}</span>
                    {% endif %}
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="auth-button">
                    <i class="fas fa-cat"></i>
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>New to CATFLIX? <a href="{% url 'register' %}">Create Account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
